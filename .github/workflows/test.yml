name: Test Memory OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We install dev dependencies for pytest. 
        # Optional: you could install [all] if you want to test all bridges, 
        # but that can be very heavy and slow. For now, we test the core logic 
        # and ensure bridges can be imported without crashing.
        pip install -e .[dev]

    - name: Run Auto Tests (Core & Adapters)
      run: |
        export PYTHONPATH=src
        python3 test_auto.py

    - name: Run Bridges and UI Tests
      run: |
        export PYTHONPATH=src
        python3 test_bridges_and_ui.py
